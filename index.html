<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1420" />

    <!-- iOS standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xandroid" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Xandroid — Levantamento de local</title>
    <meta name="description" content="Xandroid — App de documentação forense de cenas de crime. SCPe / Polícia Civil do Distrito Federal." />

    <!-- Favicon e Apple Touch Icon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Xandroid" />
    <meta property="og:title" content="Xandroid — Levantamento de local" />
    <meta property="og:description" content="App de documentação forense de cenas de crime. SCPe / Polícia Civil do Distrito Federal." />
    <meta property="og:url" content="https://xandroid.vercel.app/" />
    <meta property="og:image" content="https://xandroid.vercel.app/og-preview.jpg" />
    <meta property="og:image:secure_url" content="https://xandroid.vercel.app/og-preview.jpg" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Logo do Xandroid — caveira em fundo azul" />
    <meta property="og:locale" content="pt_BR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Xandroid — Levantamento de local" />

    <meta name="twitter:image" content="https://xandroid.vercel.app/og-preview.jpg" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #0a1420;
        color: #fff;
      }
      /* v211: overscroll-behavior REMOVIDO do body — bloqueava scroll do mouse no Chrome desktop e Android */
      #root {
        min-height: 100vh;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a1420;
        z-index: 9999;
      }
      #initial-loader .skull {
        width: 64px;
        height: 64px;
        opacity: 0.85;
        animation: pulseLoader 1.4s ease-in-out infinite;
      }
      @keyframes pulseLoader {
        0%, 100% { opacity: 0.5; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      body.app-ready #initial-loader {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader">
      <svg class="skull" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bgInit" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5AC8FA"/>
            <stop offset="100%" stop-color="#0A84FF"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="88" height="88" rx="22" fill="url(#bgInit)"/>
        <path d="M50 22 C36 22 26 32 26 47 C26 57 31 64 38 68 L38 76 Q38 80 42 80 L44 80 L44 78 C44 76 45 75 47 75 C49 75 50 76 50 78 L50 80 L56 80 L56 78 C56 76 57 75 59 75 C61 75 62 76 62 78 L62 80 L64 80 Q68 80 68 76 L68 68 C75 64 80 57 80 47 C80 32 70 22 56 22 Z" fill="#fff"/>
        <ellipse cx="41" cy="48" rx="6" ry="7" fill="#0A84FF"/>
        <ellipse cx="61" cy="48" rx="6" ry="7" fill="#0A84FF"/>
        <path d="M51 56 L48 64 L51 66 L54 64 Z" fill="#0A84FF"/>
      </svg>
    </div>
    <script>
      const checkReady = () => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.body.classList.add('app-ready');
        } else {
          requestAnimationFrame(checkReady);
        }
      };
      requestAnimationFrame(checkReady);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
